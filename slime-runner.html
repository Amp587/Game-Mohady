html<!DOCTYPE html>
<html>
<body style="margin:0;overflow:hidden;touch-action:none">
<canvas id="c"></canvas>

<div id="btnUp" style="position:fixed;right:20px;bottom:120px;width:80px;height:80px;background:rgba(255,255,255,0.3);border-radius:50%;font-size:40px;color:white;display:flex;align-items:center;justify-content:center;user-select:none;">▲</div>
<div id="btnDown" style="position:fixed;right:20px;bottom:30px;width:80px;height:80px;background:rgba(255,255,255,0.3);border-radius:50%;font-size:40px;color:white;display:flex;align-items:center;justify-content:center;user-select:none;">▼</div>

<script>
var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

var lanes=[canvas.height/4,canvas.height/2,canvas.height*3/4];
var blob={x:100,y:lanes[1],size:20,tx:lanes[1],speed:3.5,shake:0}; // SPEED AWAL DI PELANIN
var cameraX=0;
var gameOver=false, score=0, level=1, levelDistance=4000, coins=0, levelMsg=30; // JARAK FINISH DIKECILIN BIAR CEPET NAIK LV

var balls=[],gates=[],obstacles=[],particles=[],boss=null;
var currentLane=1;

var audioCtx=new (window.AudioContext||window.webkitAudioContext)();
function beep(freq){try{var o=audioCtx.createOscillator();var g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=freq;g.gain.setValueAtTime(0.1,audioCtx.currentTime);o.start();o.stop(audioCtx.currentTime+0.1);}catch(e){}}

function moveLane(dir){
  if(gameOver) return;
  if(dir==='up' && currentLane>0) currentLane--;
  if(dir==='down' && currentLane<2) currentLane++;
  blob.tx=lanes[currentLane];
  beep(440);
}

document.getElementById('btnUp').ontouchstart=document.getElementById('btnUp').onclick=function(){moveLane('up');}
document.getElementById('btnDown').ontouchstart=document.getElementById('btnDown').onclick=function(){moveLane('down');}

function getBgColor(lvl){if(lvl%3===1)return 'linear-gradient(#87CEEB,#90EE90)';if(lvl%3===2)return 'linear-gradient(#1a1a40,#4B0082)';return 'linear-gradient(#8B0000,#FF4500)';}

function generateLevel(lvl){
  balls=[]; gates=[]; obstacles=[]; boss=null;
  document.body.style.background=getBgColor(lvl);
  var jarak = 4000 + lvl*1500; // JARAK NAIK LEVEL DIKECILIN
  blob.speed = 3.5 + lvl*1.0; // SPEED NAIKNYA CUMA +1 PER LV, DULU +1.5

  for(var i=0;i<15+lvl*3;i++) balls.push({x:Math.random()*jarak,y:lanes[Math.floor(Math.random()*3)],r:8,type:'green'});
  for(var i=0;i<3+lvl;i++) balls.push({x:Math.random()*jarak,y:lanes[Math.floor(Math.random()*3)],r:12,type:'gold'});
  for(var i=0;i<3+lvl;i++) gates.push({x:Math.random()*jarak,y:lanes[Math.floor(Math.random()*3)],type:Math.random()<0.5?2:0.5});
  for(var i=0;i<10+lvl*3;i++) obstacles.push({x:Math.random()*jarak,y:lanes[Math.floor(Math.random()*3)],w:60,h:20});

  if(lvl%5===0){boss={x:jarak/2,y:lanes[1],w:120,h:40,hp:3};}
  levelMsg=30;
}
generateLevel(1);

document.onkeydown=function(e){
  if(e.key==='ArrowUp'||e.key==='w'){moveLane('up');}
  if(e.key==='ArrowDown'||e.key==='s'){moveLane('down');}
  if(e.key===' '&&gameOver){resetGame();}
};
canvas.onclick=function(){if(gameOver){resetGame();}};

function resetGame(){
  blob.size=20;score=0;coins=0;gameOver=false;generateLevel(level);cameraX=0;blob.x=100;currentLane=1;blob.tx=lanes[1];
}

function dist(a,b){return Math.sqrt((a.x-b.x)*(a.x-b.x)+(a.y-b.y)*(a.y-b.y));}
function addParticles(x,y,color){for(var i=0;i<10;i++)particles.push({x:x,y:y,vx:Math.random()*4-2,vy:Math.random()*4-2,life:20,color:color});}

function update(){
  if(!gameOver){
    blob.x+=blob.speed;
    blob.y+=(blob.tx-blob.y)*0.2;
    cameraX += (blob.x - canvas.width/3 - cameraX) * 0.1; // CAMERA NGIKUTIN PELAN 10%
    if(blob.shake>0)blob.shake--;
    if(levelMsg>0)levelMsg--;

    for(var i=balls.length-1;i>=0;i--){
      var b=balls[i];
      if(dist(blob,b)<blob.size/2+b.r){
        balls.splice(i,1);
        if(b.type==='gold'){coins+=10;score+=50;beep(880);addParticles(b.x,b.y,'#FFD700');}
        else {blob.size+=5;score+=10;beep(660);addParticles(b.x,b.y,'#00FF00');}
      }
    }
    for(var i=gates.length-1;i>=0;i--){ if(dist(blob,gates[i])<blob.size/2+20){gates.splice(i,1);if(gates[i].type===2){blob.size*=2;beep(523);}else {blob.size*=0.5;beep(330);}}}
    for(var i=0;i<obstacles.length;i++){ var o=obstacles[i]; if(blob.x>o.x&&blob.x<o.x+o.w&&blob.y+blob.size/2>o.y&&blob.y-blob.size/2<o.y+o.h){gameOver=true;blob.shake=20;beep(150);}}

    if(boss){ if(blob.x>boss.x&&blob.x<boss.x+boss.w&&blob.y+blob.size/2>boss.y-20&&blob.y-blob.size/2<boss.y+20){boss.hp--;blob.shake=10;beep(100);if(boss.hp<=0){boss=null;score+=200;}}}

    for(var i=particles.length-1;i>=0;i--){var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life--;if(p.life<=0)particles.splice(i,1);}

    if(blob.x > levelDistance){
      level++;
      levelDistance = 4000 + level*1500;
      generateLevel(level);
      blob.x=100; blob.size=20; // CAMERA GAK DI-RESET BIAR GAK KEJUT
      beep(1046);
    }
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  if(blob.shake>0){ctx.translate(Math.random()*10-5,Math.random()*10-5);}
  ctx.translate(-cameraX,0);

  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=4;
  for(var i=0;i<3;i++){ctx.beginPath();ctx.moveTo(0,lanes[i]);ctx.lineTo(cameraX+canvas.width+2000,lanes[i]);ctx.stroke();}

  for(var i=0;i<particles.length;i++){var p=particles[i];ctx.fillStyle=p.color;ctx.globalAlpha=p.life/20;ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;

  for(var i=0;i<balls.length;i++){
    var b=balls[i];
    ctx.fillStyle=b.type==='gold'?'#FFD700':'#00FF00';
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
    if(b.type==='gold'){ctx.fillStyle='black';ctx.font='10px Arial';ctx.fillText('$',b.x-4,b.y+3);}
  }
  for(var i=0;i<gates.length;i++){var g=gates[i];ctx.fillStyle=g.type===2?'#FFD700':'#FFA500';ctx.beginPath();ctx.ellipse(g.x,g.y,20,10,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='black';ctx.font='12px Arial';ctx.fillText('x'+g.type,g.x-8,g.y+4);}
  for(var i=0;i<obstacles.length;i++){var o=obstacles[i];ctx.fillStyle='#FF0000';for(var j=0;j<4;j++){ctx.beginPath();ctx.moveTo(o.x+j*15,o.y);ctx.lineTo(o.x+j*15+7,o.y-20);ctx.lineTo(o.x+j*15+15,o.y);ctx.fill();}}

  if(boss){ctx.fillStyle='#8B0000';ctx.fillRect(boss.x,boss.y-20,boss.w,boss.h);ctx.fillStyle='white';ctx.font='20px Arial';ctx.fillText('BOSS HP:'+boss.hp,boss.x+10,boss.y);}

  var w=blob.size*2, h=blob.size*0.6;
  ctx.fillStyle='#B388FF';ctx.beginPath();ctx.ellipse(blob.x,blob.y,w,h,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.ellipse(blob.x-5,blob.y-5,w*0.4,h*0.4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='black';var eyeSize=blob.size*0.2;ctx.beginPath();ctx.arc(blob.x-w*0.3,blob.y-h*0.2,eyeSize,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(blob.x+w*0.3,blob.y-h*0.2,eyeSize,0,Math.PI*2);ctx.fill();

  ctx.fillStyle='white';ctx.fillRect(levelDistance,0,10,canvas.height);
  ctx.fillStyle='black';ctx.font='20px Arial';ctx.fillText('FINISH',levelDistance+10,30);

  ctx.restore();

  ctx.fillStyle='white';ctx.font='24px Arial';
  ctx.fillText('Level: '+level,20,30);
  ctx.fillText('Score: '+score,20,60);
  ctx.fillText('Speed: '+blob.speed.toFixed(1),20,90);
  ctx.font='16px Arial';
  ctx.fillText('Pencet Tombol ▲ ▼ di kanan',20,115);

  if(levelMsg>0){
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='yellow';ctx.font='72px Arial';ctx.fillText('LEVEL '+level,canvas.width/2-150,canvas.height/2);
  }
  if(gameOver){ctx.fillStyle='black';ctx.font='48px Arial';ctx.fillText('SLIME MELEH :(',canvas.width/2-150,canvas.height/2);ctx.font='20px Arial';ctx.fillText('Klik layar atau Spasi',canvas.width/2-100,canvas.height/2+40);}
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
