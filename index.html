html<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTS 15 Soal</title>
<style>
  body { font-family: Arial, sans-serif; background:#f0f0f0; margin:0; padding:15px; text-align:center; }
  #grid { display:grid; grid-template-columns:repeat(20, 26px); gap:2px; justify-content:center; margin:15px auto; }
 .cell { width:26px; height:26px; border:1px solid #000; background:#fff; position:relative; }
 .cell.black { background:#000; border:1px solid #000; }
 .cell input { width:100%; height:100%; border:none; text-align:center; font-weight:bold; text-transform:uppercase; font-size:14px; }
 .cell span { position:absolute; top:1px; left:2px; font-size:9px; font-weight:bold; }
  button { padding:10px 18px; margin:5px; border:none; border-radius:6px; background:#007bff; color:#fff; font-weight:bold; cursor:pointer; }
  #clues { text-align:left; max-width:500px; margin:15px auto; background:#fff; padding:10px; border-radius:8px; }
</style>
</head>
<body>
<h2>TTS 15 SOAL</h2>
<div id="grid"></div>
<button onclick="cekJawaban()">Cek Jawaban</button>
<button onclick="resetGame()">Reset</button>
<div id="clues"><h3>Petunjuk:</h3></div>

<script>
const SIZE = 20; // Grid 20x20 biar gak bentrok
const WORDS = [
  {no:1, r:1, c:1, d:'A', a:'NABI', k:'Utusan Tuhan'},
  {no:2, r:1, c:1, d:'D', a:'NILA', k:'Warna biru tua'},
  {no:3, r:3, c:1, d:'A', a:'SAWAH', k:'Tempat nanam padi'},
  {no:4, r:1, c:6, d:'D', a:'JAKARTA', k:'Ibukota Indonesia'},
  {no:5, r:5, c:1, d:'A', a:'PULPEN', k:'Benda untuk menulis'},
  {no:6, r:3, c:6, d:'D', a:'PANDAI', k:'Rajin pangkal'},
  {no:7, r:5, c:3, d:'D', a:'HITAM', k:'Warna gelap'},
  {no:8, r:7, c:1, d:'A', a:'KAYA', k:'Hemat pangkal'},
  {no:9, r:7, c:1, d:'D', a:'NASI', k:'Makanan pokok'},
  {no:10, r:5, c:7, d:'D', a:'RUPIAH', k:'Mata uang Indonesia'},
  {no:11, r:9, c:1, d:'A', a:'BERSIH', k:'Bagian dari iman'},
  {no:12, r:7, c:5, d:'D', a:'MEMBACA', k:'Kegiatan Literasi'},
  {no:13, r:9, c:3, d:'D', a:'HURUF', k:'Kumpulan Abjad'},
  {no:14, r:11, c:1, d:'A', a:'PANCASILA', k:'Dasar Negara'},
  {no:15, r:11, c:1, d:'D', a:'HAJI', k:'Rukun Islam ke 5'}
];

const gridEl = document.getElementById('grid');
const cluesEl = document.getElementById('clues');

// 1. Bikin grid kosong semua hitam dulu
for(let i=0; i<SIZE*SIZE; i++){
  let div = document.createElement('div');
  div.className = 'cell black';
  gridEl.appendChild(div);
}

// 2. Lubangin grid sesuai WORDS, dijamin gak bentrok
WORDS.forEach(w => {
  for(let i=0; i<w.a.length; i++){
    let r = w.d === 'A'? w.r : w.r + i;
    let c = w.d === 'A'? w.c + i : w.c;
    let idx = r * SIZE + c;
    gridEl.children[idx].className = 'cell';
    if(i === 0){
      gridEl.children[idx].innerHTML = `<span>${w.no}</span><input id="c${r}-${c}" maxlength="1">`;
    } else {
      gridEl.children[idx].innerHTML = `<input id="c${r}-${c}" maxlength="1">`;
    }
  }
  cluesEl.innerHTML += `<p><b>${w.no}.</b> ${w.k} [${w.d}] ${w.a.length} huruf</p>`;
});

function cekJawaban(){
  let benar=0, total=0;
  WORDS.forEach(w=>{
    for(let i=0; i<w.a.length; i++){
      let r = w.d === 'A'? w.r : w.r + i;
      let c = w.d === 'A'? w.c + i : w.c;
      let inp = document.getElementById(`c${r}-${c}`);
      if(inp){
        total++;
        if(inp.value.toUpperCase() === w.a[i]){
          benar++; inp.style.background='#b6f7b6';
        } else {
          inp.style.background='#f7b6b6';
        }
      }
    }
  });
  alert(`Skor: ${benar} / ${total}`);
}
function resetGame(){ location.reload(); }
</script>
</body>
</html>
