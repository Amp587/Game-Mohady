<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>TTS Mohady</title>  
<style> 
  body { font-family: Arial; background:#f2f2f2; text-align:center; padding:10px; }
  #grid { display:grid; grid-template-columns:repeat(15, 30px); gap:2px; justify-content:center; margin:15px auto; }
.cell { width:30px; height:30px; border:1px solid #000; background:#000; position:relative; }
.cell input { width:100%; height:100%; border:none; text-align:center; font-weight:bold; text-transform:uppercase; background:#fff; }
.cell span { position:absolute; top:0; left:2px; font-size:9px; font-weight:bold; color:#000; background:#fff; padding:0 1px; }
  button { padding:10px 20px; margin:5px; border:none; border-radius:8px; background:#28a745; color:#fff; font-weight:bold; cursor:pointer; }
  #clues { display:flex; gap:20px; justify-content:center; flex-wrap:wrap; max-width:800px; margin:10px auto; text-align:left; }
  #clues > div { background:#fff; padding:15px; border-radius:8px; flex:1; min-width:280px; }
  #timer {
  font-size: 1.5rem;
  font-weight: bold;
  color: #d32f2f; 
  text-align: center;
  margin: 10px auto 15px auto;
  padding: 10px;
  background: #ffebee;
  border: 2px solid #d32f2f;
  border-radius: 8px;
  max-width: 200px;
  font-family: monospace;
}
#timer.habis { 
  color: white; 
  background: red; 
  animation: blink 0.5s infinite; 
}
@keyframes blink { 50% { opacity: 0.5s; }           
</style>
</head>
<body>
<h2>TTS Mohady </h2>
  <div id="timer">Waktu: 05:00</div> 
<div id="grid"></div>
<button onclick="checkScore()">Check Score</button>
<button onclick="resetGame()">Reset</button>

<div id="clues">
  <div><h3>Mendatar -></h3><ol id="across"></ol></div>
  <div><h3>Menurun ↓</h3><ol id="down"></ol></div>
</div>

<audio id="suaraBenar" src="https://actions.google.com/sounds/v1/human_voices/tada.ogg"></audio>
<audio id="suaraSalah" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
  
<script>
const SIZE = 15;
// FIX: NILA digeser ke r:1 biar nomor 2 pisah dari nomor 1
const WORDS = [
  // 1. ISLAM ketemu 2D di huruf I
  {no: 1, r: 1, c: 1, d:'A', a:'ISLAM', k:'Agama rahmatan lil alamin'}, 
  // 2. IMAN ketemu 1A di huruf I 
  {no: 2, r: 1, c: 1, d:'D', a:'IMAN', k:'Rukun iman yang pertama'},
  // 3. SAJADAH ketemu 4A di huruf D
  {no: 3, r: 1, c: 6, d:'D', a:'SAJADAH', k:'Alas untuk sholat'},
  // 4. DOA ketemu 3D di huruf D
  {no: 4, r: 1, c: 10, d:'A', a:'DOA', k:'Permohonan ke Allah'},
  // 5. NABI ketemu 2D di huruf M
  {no: 5, r: 3, c: 1, d:'A', a:'NABI', k:'Utusan Allah'},
  // 6. KITAB ketemu 4A di huruf I
  {no: 6, r: 3, c: 5, d:'D', a:'KITAB', k:'Al-Quran'},
  // 7. TAQWA ketemu 4A di huruf A
  {no: 7, r: 3, c: 10, d:'D', a:'TAQWA', k:'Takut kepada Allah'},
  // 8. PUASA ketemu 5A di huruf N
  {no: 8, r: 5, c: 1, d:'A', a:'PUASA', k:'Rukun Islam ke-3'},
  // 9. ZAKAT ketemu 6D di huruf B
  {no: 9, r: 5, c: 6, d:'A', a:'ZAKAT', k:'Rukun Islam ke-4'},
  // 10. HAJI ketemu 9A di huruf A
  {no: 10, r: 5, c: 12, d:'D', a:'HAJI', k:'Rukun Islam ke-5'},
  // 11. SABAR ketemu 8A di huruf S
  {no: 11, r: 7, c: 1, d:'A', a:'SABAR', k:'Tahan uji'},
  // 12. SYUKUR ketemu 9A di huruf A
  {no: 12, r: 7, c: 6, d:'D', a:'SYUKUR', k:'Berterima kasih'},
  // 13. IKHLAS ketemu 10D di huruf I
  {no: 13, r: 7, c: 12, d:'A', a:'IKHLAS', k:'Tulus hati'},
  // 14. MASJID ketemu 11A di huruf S
  {no: 14, r: 9, c: 1, d:'D', a:'MASJID', k:'Rumah Allah'},
  // 15. WUDHU ketemu 12D di huruf U
  {no: 15, r: 9, c: 7, d:'A', a:'WUDHU', k:'Bersuci sebelum sholat'},
  // 16. IMAM ketemu 13A di huruf I
  {no: 16, r: 9, c: 12, d:'D', a:'IMAM', k:'Pemimpin sholat'},
  // 17. ADZAN ketemu 14D di huruf M
  {no: 17, r: 11, c: 1, d:'A', a:'ADZAN', k:'Panggilan sholat'},
  // 18. IQOMAH ketemu 15A di huruf H
  {no: 18, r: 11, c: 6, d:'D', a:'IQOMAH', k:'Panggilan kedua'},
  // 19. SHOLAT ketemu 16D di huruf M
  {no: 19, r: 11, c: 12, d:'A', a:'SHOLAT', k:'Ibadah 5 waktu'},
  // 20. SURGA ketemu 17A di huruf S
  {no: 20, r: 13, c: 1, d:'D', a:'SURGA', k:'Tempat mulia'},
  // 21. NERAKA ketemu 18D di huruf O
  {no: 21, r: 13, c: 6, d:'A', a:'NERAKA', k:'Tempat siksa'},
  // 22. BERKAH ketemu 19A di huruf L
  {no: 22, r: 13, c: 12, d:'D', a:'BERKAH', k:'Keberkahan'},
  // 23. RAHMAT ketemu 20D di huruf R
  {no: 23, r: 15, c: 1, d:'A', a:'RAHMAT', k:'Kasih sayang Allah'},
  // 24. NIKMAT ketemu 21A di huruf K
  {no: 24, r: 15, c: 7, d:'D', a:'NIKMAT', k:'Karunia'},
  // 25. HIDAYAH ketemu 22D di huruf H
  {no: 25, r: 15, c: 12, d:'A', a:'HIDAYAH', k:'Petunjuk Allah'},
  // 26. TOBAT ketemu 2D di huruf O
  {no: 26, r: 2, c: 3, d:'A', a:'TOBAT', k:'Kembali ke Allah'},
  // 27. AMAL ketemu 26A di huruf O
  {no: 27, r: 4, c: 3, d:'D', a:'AMAL', k:'Perbuatan'},
  // 28. PAHALA ketemu 27D di huruf M
  {no: 28, r: 6, c: 3, d:'A', a:'PAHALA', k:'Ganjaran baik'},
  // 29. DOSA ketemu 28A di huruf A
  {no: 29, r: 8, c: 3, d:'D', a:'DOSA', k:'Perbuatan buruk'},
  // 30. RIDHO ketemu 29D di huruf O
  {no: 30, r: 10, c: 3, d:'A', a:'RIDHO', k:'Kerelaan Allah'}
 ]

const gridEl = document.getElementById('grid');
const acrossEl = document.getElementById('across');
const downEl = document.getElementById('down');

// Gak perlu kumpul nomor lagi karena udah dipisah
const nomorDiKotak = {};
WORDS.forEach(w => {
  let key = w.r + '-' + w.c;
  nomorDiKotak[key] = w.no; // Langsung 1 nomor aja
});

// Bikin grid hitam
for(let i=0; i<SIZE*SIZE; i++){
  gridEl.innerHTML += '<div class="cell"></div>';
}

// Isi kata + nomor
WORDS.forEach(w => {
  let targetOl = w.d === 'A'? acrossEl : downEl;
  targetOl.innerHTML += `<li><b>${w.no}.</b> ${w.k} (${w.a.length})</li>`;

  for(let i=0; i<w.a.length; i++){
    let r = w.d === 'A'? w.r : w.r + i;
    let c = w.d === 'A'? w.c + i : w.c;
    let cell = gridEl.children[r * SIZE + c];
    cell.style.background = '#fff';
    if(i === 0){
      let key = r + '-' + c;
      cell.innerHTML = `<span>${nomorDiKotak[key]}</span><input id="c${r}-${c}" maxlength="1">`; // Cuma 1 nomor
    } else {
      cell.innerHTML = `<input id="c${r}-${c}" maxlength="1">`;
    }
  }
});

function playSound(id){ let s=document.getElementById(id); s.currentTime=0; s.volume=1; s.play(); }

function checkScore(){
  let benar=0, total=0, salah=false;
  WORDS.forEach(w=>{
    for(let i=0; i<w.a.length; i++){
      let r = w.d === 'A'? w.r : w.r + i;
      let c = w.d === 'A'? w.c + i : w.c;
      let inp = document.getElementById(`c${r}-${c}`);
      if(inp){
        total++;
        if(inp.value.toUpperCase() === w.a[i]){ benar++; inp.style.background='#b6f7b6'; } 
        else { inp.style.background='#f7b6b6'; salah=true; }
      }
    }
  });
  if(salah){ playSound('suaraSalah'); alert(`Skor: ${benar}/${total}`); }
  else { playSound('suaraBenar'); alert(`YEAY SEMPURNA: ${benar}/${total}`); }
}
// ===== TIMER 5 MENIT + RESET FIX =====
const timerEl = document.getElementById('timer');
let waktu = 300; // 5 menit = 300 detik
let interval = null; 

function updateTimer() {
  let m = Math.floor(waktu / 60);
  let s = waktu % 60;
  timerEl.textContent = `Waktu: ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function startTimer() {
  clearInterval(interval); 
  updateTimer(); // Pastiin muncul 05:00 dulu, diem 1 detik
  interval = setInterval(() => {
    waktu--;
    updateTimer();
    if (waktu <= 10) timerEl.classList.add('habis');
    if (waktu <= 0) {
      clearInterval(interval);
      playSound('suaraSalah'); 
      alert('WAKTU HABIS');
      document.querySelectorAll('input').forEach(i => i.disabled = true);
    }
  }, 1000);
}

function resetGame(){
  clearInterval(interval); // Stop timer lama biar gak dobel
  waktu = 300; // Balikin ke 5 menit
  document.querySelectorAll('.kotak, input, textarea, [contenteditable]').forEach(i => {
  i.disabled = false;
  i.value = '';
  i.textContent = '';
  i.style.backgroundColor = ''; // <- PAKSA PUTIHIN MANUAL
  i.classList.remove('benar', 'salah', 'habis', 'active'); // <- HAPUS SEMUA CLASS WARNA
});
  timerEl.classList.remove('habis'); 
  startTimer(); // Jalan lagi dari 05:00
}

startTimer(); // Jalan pertama kali pas web dibuka
// ===== TIMER SELESAI =====
    
</script> 
</body>
</html>
