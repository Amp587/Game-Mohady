html<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>TTS GAME 50x50</title>
<style>
body{font-family:sans-serif;background:#f4f4f4;margin:0;padding:10px;text-align:center}
#grid{display:grid;grid-template-columns:repeat(20,25px);gap:2px;justify-content:center;margin:10px auto}
.cell{width:25px;height:25px;border:1px solid #000;background:#fff;text-align:center;text-transform:uppercase;font-weight:bold;position:relative}
.cell.black{background:#000}
.cell span{position:absolute;top:1px;left:2px;font-size:9px}
button{margin:5px;padding:10px 20px;border:none;border-radius:8px;background:#28a745;color:#fff;font-weight:bold;cursor:pointer}
</style>
</head>
<body>
<h2>TTS GAME 50x50</h2>
<div id="grid"></div>
<button onclick="cekJawaban()">Cek Jawaban</button>
<button onclick="location.reload()">Ulang Game</button>
<div id="clues"></div>
<script>
const WORDS = [
  {no:1, row:0, col:0, dir:'A', ans:'NABI', clue:'Utusan Tuhan'},
  {no:2, row:0, col:0, dir:'D', ans:'NILA', clue:'Warna biru tua'},
  {no:3, row:2, col:0, dir:'A', ans:'SAWAH', clue:'Tempat nanam padi'},
  {no:4, row:0, col:4, dir:'D', ans:'JAKARTA', clue:'Ibukota Indonesia'},
  {no:5, row:4, col:2, dir:'A', ans:'PULPEN', clue:'Benda untuk menulis'},
  {no:6, row:6, col:0, dir:'D', ans:'PANDAI', clue:'Rajin pangkal'},
  {no:7, row:8, col:2, dir:'A', ans:'HITAM', clue:'Warna gelap'},
  {no:8, row:6, col:5, dir:'D', ans:'KAYA', clue:'Hemat pangkal'},
  {no:9, row:10, col:0, dir:'A', ans:'NASI', clue:'Makanan pokok'},
  {no:10, row:8, col:7, dir:'D', ans:'RUPIAH', clue:'Mata uang Indonesia'},
  {no:11, row:12, col:0, dir:'A', ans:'BERSIH', clue:'Bagian dari iman'},
  {no:12, row:10, col:4, dir:'D', ans:'MEMBACA', clue:'Literasi'},
  {no:13, row:14, col:0, dir:'A', ans:'HURUF', clue:'Abjad'},
  {no:14, row:12, col:6, dir:'D', ans:'PANCASILA', clue:'Dasar Negara'},
  {no:15, row:16, col:0, dir:'A', ans:'HAJI', clue:'Rukun Islam ke lima'}
];

const grid = document.getElementById('grid');
const cluesDiv = document.getElementById('clues');
let cells = {};

WORDS.forEach(w=>{
  let clueEl = document.createElement('p');
  clueEl.textContent = w.no + '. ' + w.clue + ' (' + w.dir + ' + w.ans.length + ')';
  cluesDiv.appendChild(clueEl);
  for(let i=0;i<w.ans.length;i++){
    let r = w.dir==='A'? w.row : w.row+i;
    let c = w.dir==='A'? w.col+i : w.col;
    let key = r+'-'+c;
    if(!cells[key]){
      let div = document.createElement('div');
      div.className='cell';
      div.innerHTML = `<span>${i===0?w.no:''}</span><input maxlength="1" id="cell-${key}">`;
      grid.appendChild(div);
      cells[key]=div;
    }
  }
});

function cekJawaban(){
  let benar=0, total=0;
  WORDS.forEach(w=>{
    for(let i=0;i<w.ans.length;i++){
      let r = w.dir==='A'? w.row : w.row+i;
      let c = w.dir==='A'? w.col+i : w.col;
      let inp = document.getElementById(`cell-${r}-${c}`);
      if(inp){
        total++;
        if(inp.value.toUpperCase()===w.ans[i]){benar++; inp.style.background='#c8e6c9'}
        else{inp.style.background='#ffcdd2'}
      }
    }
  });
  alert(`Benar: ${benar} dari ${total}`);
}
</script>
</body>
</html>
